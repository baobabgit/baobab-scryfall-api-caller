# Qualite statique + tests + couverture (seuil 90 % dans pyproject.toml).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    name: Quality & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # requires-python >=3.11 ; black target-version py311
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: black (check)
        run: python -m black --check src tests

      - name: pylint
        run: python -m pylint src/baobab_scryfall_api_caller --fail-under=10

      - name: mypy
        run: python -m mypy src/baobab_scryfall_api_caller

      - name: flake8
        run: python -m flake8 src tests

      - name: bandit
        run: python -m bandit -c pyproject.toml -r src tests

      - name: pytest (coverage >= 90 %)
        run: python -m pytest tests/
